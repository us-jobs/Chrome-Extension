<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    body { font-family: -apple-system, sans-serif; min-width: 300px; padding: 16px; margin: 0; }
    .header { display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #ccc; padding-bottom: 8px; margin-bottom: 12px; }
    .usage-bar { background: #e0e0e0; height: 8px; border-radius: 4px; margin: 8px 0; overflow: hidden; }
    .usage-fill { background: #1a73e8; height: 100%; width: 0%; transition: width 0.3s; }
    .history-item { font-family: monospace; font-size: 11px; padding: 6px; border-bottom: 1px solid #eee; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    button { cursor: pointer; padding: 4px 8px; }
  </style>
</head>
<body>
  <div class="header">
    <h3 style="margin:0">🔍 ErrorLens</h3>
    <button id="btn-login">Sign In</button>
  </div>
  
  <div id="usage-section">
    <strong>Usage Today</strong>
    <div class="usage-bar"><div id="usage-fill" class="usage-fill"></div></div>
    <div id="usage-text" style="font-size: 12px; color: #555;">Loading...</div>
  </div>

  <div id="history-section" style="margin-top: 16px;">
    <strong>Recent History</strong>
    <div id="history-list">Loading...</div>
  </div>

  <script type="module" src="./popup.ts"></script>
</body>
</html>
